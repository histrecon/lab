<style>

        box-shadow: 0 3px 15px rgba(0, 0, 0, 0.4);
        height: 55px;
        display: flex;
        align-items: center;
    }
    
    .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        height: 100%;
    }
    
    .nav-logo {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #e6a336;
        text-decoration: none;
        font-weight: bold;
        font-size: 1.1rem;
        padding: 6px 12px;
        border: 1px solid #d4a574;
        border-radius: 6px;
        background: rgba(139, 69, 19, 0.2);
        transition: all 0.3s;

    .nav-logo:hover {

    }
    
    .nav-menu {
        display: flex;
        gap: 10px;
        align-items: center;
        height: 100%;
    }
    
    .nav-menu-item {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #f5ebd8;
        text-decoration: none;
        padding: 6px 12px;
        border-radius: 5px;
        transition: all 0.3s;
        font-weight: 600;
        font-size: 0.9rem;
        border: 1px solid transparent;
        height: 36px;
        background: transparent;
        cursor: pointer;
        font-family: inherit;
    }
    
    .nav-menu-item:hover {
        background: rgba(230, 163, 54, 0.2);
        color: #ffcc66;
        border-color: #d4a574;
        transform: translateY(-1px);
    }
    
    .nav-menu-item.active {
        background: linear-gradient(135deg, #e6a336, #d1891c);
        color: #333;
        border-color: #c17e1a;
    }
    
    /* Стиль для кнопки Донат */
    .donate-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #ff8a8a;
        background: rgba(255, 50, 50, 0.15);
        border: 1px solid #ff6b6b;
        border-radius: 5px;
        padding: 6px 12px;
        height: 36px;

        font-size: 0.9rem;

    .donate-btn:hover {
        background: rgba(255, 50, 50, 0.3);
        color: #ff4444;
        border-color: #ff4444;
        transform: translateY(-1px);
    }
    
    /* МОДАЛЬНОЕ ОКНО - СКРЫТО ПО УМОЛЧАНИЮ */
    .donate-modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.7);
        backdrop-filter: blur(4px);
        align-items: center;
        justify-content: center;
    }
    
    /* ПОКАЗЫВАЕМ МОДАЛКУ, КОГДА ЧЕКБОКС ВКЛЮЧЕН */
    #donateToggle:checked ~ .donate-modal {
        display: flex;
    }
    
    /* Стили содержимого модалки */
    .donate-modal-content {
        background: #2a1f14;
        padding: 30px 35px;
        border: 2px solid #d4a574;
        border-radius: 16px;
        max-width: 400px;
        width: 90%;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        position: relative;
        animation: modalFadeIn 0.3s ease;
    }
    
    @keyframes modalFadeIn {
        from { opacity: 0; transform: scale(0.95) translateY(-20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
    }
    
    .donate-close {
        position: absolute;
        top: 10px;
        right: 18px;
        font-size: 28px;
        color: #bbb;
        cursor: pointer;
        transition: color 0.2s;
        line-height: 1;
        display: block;
    }
    
    .donate-close:hover {
        color: #fff;
    }
    
    .donate-modal-content h3 {
        color: #f5ebd8;
        font-size: 1.5rem;
        margin: 0 0 8px 0;
    }
    
    .donate-modal-content p {
        color: #ccc;
        font-size: 1rem;
        margin: 0 0 20px 0;
    }
    
    .donate-options {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }
    
    .donate-option {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 24px;
        background: rgba(230, 163, 54, 0.15);
        border: 1px solid #d4a574;
        border-radius: 10px;
        color: #f5ebd8;
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.3s;
        min-width: 100px;
        justify-content: center;
    }
    
    .donate-option:hover {
        background: rgba(230, 163, 54, 0.3);
        border-color: #e6a336;
        transform: translateY(-2px);
        color: #ffcc66;
    }
    
    @media (max-width: 768px) {
        .navigation-module {
            height: auto;
            padding: 5px 10px;
        }
        
        .nav-container {
            flex-direction: column;
            gap: 8px;
        }
        
        .nav-logo {
            height: 32px;
            font-size: 1rem;
            padding: 5px 10px;
        }
        
        .nav-menu {
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .nav-menu-item {
            padding: 4px 8px;
            font-size: 0.85rem;
            height: 32px;
        }
        
        .donate-btn {
            padding: 4px 8px;
            font-size: 0.85rem;
            height: 32px;
        }
        
        .donate-modal-content {
            padding: 20px;
        }
        
        .donate-options {
            gap: 12px;
        }
        
        .donate-option {
            padding: 10px 16px;
            font-size: 0.9rem;
            min-width: 80px;
        }
    }
</style>

<script>
    // Подсветка активной страницы (работает независимо)
    (function() {
        var currentPage = window.location.pathname.split('/').pop() || 'index.html';
        if (currentPage.includes('?')) currentPage = currentPage.split('?')[0];
        if (currentPage.includes('#')) currentPage = currentPage.split('#')[0];
        
        var navItems = document.querySelectorAll('.nav-menu-item');
        for (var i = 0; i < navItems.length; i++) {
            var href = navItems[i].getAttribute('href');
            if (href === currentPage) {
                navItems[i].classList.add('active');
            }
        }
    })();
</script>
